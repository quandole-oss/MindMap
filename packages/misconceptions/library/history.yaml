- id: hist-001
  name: "Columbus proved the Earth was round"
  domain: history
  grade_band: "6-8"
  description: "Students believe Columbus's 1492 voyage settled the debate about Earth's shape. In reality, educated Europeans had known Earth was spherical since ancient Greece; Eratosthenes calculated its circumference around 240 BCE. Columbus's contemporaries disputed his estimate of Earth's size, not its shape."
  citation: "Loewen, J. W. (1995). Lies My Teacher Told Me: Everything Your American History Textbook Got Wrong. The New Press."
  probe_questions:
    - "Why did Columbus's crew worry about sailing west across the Atlantic?"
    - "Did people in 1492 believe the Earth was flat? How do you know?"
    - "If educated people already knew Earth was round, why was Columbus's voyage controversial?"
  confrontation_scenarios:
    - "The ancient Greek scholar Eratosthenes calculated Earth's circumference to within about 2% accuracy around 240 BCE — nearly 1,700 years before Columbus. Medieval European scholars, educated sailors, and the Church all accepted a spherical Earth. Columbus's Spanish critics were actually right: they thought his estimate of the distance to Asia was too short. Columbus was wrong about the size of Earth; he stumbled upon continents he didn't know existed. What was Columbus actually arguing with his critics about?"

- id: hist-002
  name: "Medieval people thought the Earth was flat"
  domain: history
  grade_band: "6-8"
  description: "Students and many textbooks claim that medieval Europeans believed in a flat Earth. This is a 19th-century myth. Medieval scholars, clergy, and educated people universally accepted a spherical Earth, drawing on ancient Greek knowledge."
  citation: "Russell, J. B. (1991). Inventing the Flat Earth: Columbus and Modern Historians. Praeger."
  probe_questions:
    - "Did people in the Middle Ages (500-1400 CE) think the Earth was flat?"
    - "Where do you think the idea came from that medieval people believed in a flat Earth?"
    - "How would medieval astronomers have been able to predict lunar eclipses accurately if they thought the Earth was flat?"
  confrontation_scenarios:
    - "Historian Jeffrey Burton Russell documented that no educated person in medieval Europe believed in a flat Earth. Medieval universities taught Aristotle and Ptolemy — both of whom described a spherical Earth. The flat-Earth myth was largely invented by Washington Irving (in a fictionalized biography of Columbus, 1828) and spread through popular culture. Medieval astronomy, navigation, and theology all assumed a round Earth. How did a historical fiction become accepted as fact?"

- id: hist-003
  name: "The Declaration of Independence freed the slaves"
  domain: history
  grade_band: "6-8"
  description: "Students confuse the Declaration of Independence (1776) with the Emancipation Proclamation (1863) or the 13th Amendment (1865). The Declaration declared political independence from Britain; it did not free enslaved people, and slavery continued for another 89 years."
  citation: "Wineburg, S. (2001). Historical Thinking and Other Unnatural Acts: Charting the Future of Teaching the Past. Temple University Press."
  probe_questions:
    - "What did the Declaration of Independence actually declare?"
    - "If the Declaration says 'all men are created equal,' did that apply to enslaved people in 1776?"
    - "What year did slavery legally end in the United States? What document ended it?"
  confrontation_scenarios:
    - "Thomas Jefferson wrote 'all men are created equal' in the Declaration while himself enslaving over 600 people over his lifetime. The Declaration was a political statement of independence from Britain — it changed no laws regarding slavery. Slavery continued for 87 more years after the Declaration. The Emancipation Proclamation (1863) freed enslaved people in Confederate states during the Civil War, and the 13th Amendment (1865) abolished slavery nationwide. What does the gap between the Declaration's ideals and its practice tell us about history?"

- id: hist-004
  name: "The American Revolution was only about taxation without representation"
  domain: history
  grade_band: "6-8"
  description: "Students reduce the American Revolution to a single cause — taxation without representation — missing the complex web of economic interests, class tensions, colonial identity formation, Enlightenment philosophy, and power struggles between colonial elites and the British Empire."
  citation: "Nash, G. B. (2005). The Unknown American Revolution: The Unruly Birth of Democracy and the Struggle to Create America. Viking."
  probe_questions:
    - "Why did colonists rebel against Britain? Was it just about taxes?"
    - "Who benefited from the Revolution? Were all colonists equally in favor of it?"
    - "What role did Enlightenment ideas about natural rights play in the Revolution?"
  confrontation_scenarios:
    - "About one-third of colonists supported the Revolution, one-third opposed it (Loyalists), and one-third were neutral. Many enslaved people sided with Britain (which promised freedom to those who escaped Patriot masters). Indigenous nations largely opposed American expansion. The Revolution was driven by colonial merchants wanting to escape British trade regulations, Enlightenment ideas about self-governance, local elites seeking to consolidate power, and genuine grievances about parliamentary representation. Is 'no taxation without representation' the complete story?"

- id: hist-005
  name: "Ancient Egyptians used slaves to build the pyramids"
  domain: history
  grade_band: "6-8"
  description: "Students believe the pyramids were built by enslaved people, often picturing the biblical slavery narrative. Archaeological evidence from worker villages and skeletal analysis indicates the pyramids were built by paid skilled workers and conscripted labor — not chattel slaves."
  citation: "Hawass, Z. (2010). The Pyramids of Ancient Egypt. Carnegie Museum of Natural History."
  probe_questions:
    - "Who built the Egyptian pyramids? How do you think we know this?"
    - "What evidence could archaeologists find that would tell us about the workers' lives?"
    - "Is there a difference between a slave, a conscripted worker, and a paid worker?"
  confrontation_scenarios:
    - "Archaeologists excavated a worker village near the Giza pyramids in the 1990s-2000s. They found bakeries, breweries, medical care evidence (healed bones, amputations), and tombs with honorable burials — signs of valued workers. Graffiti records work gangs with names like 'Friends of Khufu.' Workers appear to have been paid in food and goods, with skilled artisans having permanent positions. This doesn't match a slave-labor model. What might have motivated free workers to build these monuments?"

- id: hist-006
  name: "History is just memorizing dates and names"
  domain: history
  grade_band: "K-5"
  description: "Students believe historical study consists of memorizing facts — dates, names of rulers, battle outcomes — rather than understanding historical thinking skills: analyzing primary sources, evaluating evidence, understanding causation, and recognizing multiple perspectives."
  citation: "Seixas, P., & Morton, T. (2013). The Big Six Historical Thinking Concepts. Nelson Education."
  probe_questions:
    - "What does a historian actually do all day?"
    - "How do we know what happened in the past before cameras or writing existed?"
    - "Can two historians look at the same evidence and reach different conclusions? Why?"
  confrontation_scenarios:
    - "Historians are investigators, not memorizers. When archaeologists found the Tomb of Tutankhamun in 1922, they had to interpret artifacts, compare them with other finds, read hieroglyphs, and debate what objects meant about Egyptian life and religion. When two historians disagree about the causes of World War I, they are examining primary sources — letters, government documents, newspapers — and weighing evidence. What skills would you need to investigate the past the way historians do?"

- id: hist-007
  name: "The Civil War was primarily about states' rights, not slavery"
  domain: history
  grade_band: "9-12"
  description: "Students, particularly from certain regional textbook traditions, learn that the Civil War was fundamentally about states' rights as an abstract principle. Historians point to Confederate declarations of secession, Confederate constitution text, and antebellum political debates as showing slavery was the central issue the seceding states were defending."
  citation: "Foner, E. (2010). The Fiery Trial: Abraham Lincoln and American Slavery. W. W. Norton & Company."
  probe_questions:
    - "What does 'states' rights' mean? Which specific right were Confederate states most concerned about?"
    - "Have you read any of the actual declarations of secession from Confederate states?"
    - "Who wrote the Confederate constitution, and what protections did it include?"
  confrontation_scenarios:
    - "Mississippi's declaration of secession (January 1861) opens: 'Our position is thoroughly identified with the institution of slavery — the greatest material interest of the world.' South Carolina's, Georgia's, and Texas's declarations similarly center on slavery. Confederate Vice President Alexander Stephens gave the 'Cornerstone Speech' (1861) explicitly stating slavery was the 'cornerstone' of the Confederacy. The Confederate Constitution explicitly protected slavery. Primary source documents make the central issue clear. What does reading primary sources tell you that secondary narratives sometimes omit?"

- id: hist-008
  name: "Technological progress is always beneficial and linear"
  domain: history
  grade_band: "9-12"
  description: "Students view technological development as uniformly positive and as a steady march of improvement. Historical analysis shows that technologies can have severe negative consequences, create new inequalities, eliminate beneficial practices, and follow non-linear paths with setbacks."
  citation: "Winner, L. (1986). Do Artifacts Have Politics? In The Whale and the Reactor: A Search for Limits in an Age of High Technology. University of Chicago Press."
  probe_questions:
    - "Has every new technology improved people's lives? Can you think of any exceptions?"
    - "When a new technology appears, who benefits and who might be harmed?"
    - "Can technology solve social problems, or does it sometimes create new ones?"
  confrontation_scenarios:
    - "The cotton gin (1793) made cotton processing vastly more efficient — and dramatically increased the demand for enslaved labor in the American South, intensifying slavery. The Enclosure Acts in England used new land management techniques to displace millions of subsistence farmers from common lands, creating extreme poverty while increasing agricultural efficiency. The printing press spread Reformation ideas — and also printed propaganda that fueled religious wars. Technological change creates winners and losers. Whose interests does a new technology serve? Who bears its costs?"
